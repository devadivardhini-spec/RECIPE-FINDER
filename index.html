<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FlavorFind | Recipe Explorer</title>
    <!-- Poppins Font & Google Icons (Material Symbols for heart) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
    <style>
        /* ---------- RESET & GLOBAL ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s;
        }

        :root {
            --bg-body: #fef9f0;
            --bg-card: #ffffff;
            --text-primary: #2d2f36;
            --text-secondary: #5a5e6b;
            --accent: #e25822;
            --accent-hover: #c94f1f;
            --border-light: #f0e5da;
            --shadow-sm: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02);
            --shadow-md: 0 20px 30px -12px rgba(0,0,0,0.1);
            --modal-overlay: rgba(0,0,0,0.7);
            --heart-active: #e34234;
            --heart-inactive: #cbd5e1;
        }

        body.dark {
            --bg-body: #121212;
            --bg-card: #1e1e2a;
            --text-primary: #ececec;
            --text-secondary: #b9b9c3;
            --border-light: #2c2c36;
            --shadow-sm: 0 10px 25px -5px rgba(0,0,0,0.4);
            --modal-overlay: rgba(0,0,0,0.85);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* HEADER & TOGGLES */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .logo h1 {
            font-weight: 700;
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--accent), #ff8c42);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .logo p {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .dark-toggle, .surprise-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: var(--shadow-sm);
        }
        .surprise-btn {
            background: var(--accent);
            color: white;
            border: none;
        }
        .surprise-btn:hover {
            background: var(--accent-hover);
            transform: scale(0.98);
        }

        /* SEARCH SECTION */
        .search-section {
            margin-bottom: 2rem;
        }
        .search-wrapper {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            max-width: 700px;
        }
        .search-input {
            flex: 1;
            padding: 0.9rem 1.5rem;
            border-radius: 60px;
            border: 1px solid var(--border-light);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }
        .search-input:focus {
            border-color: var(--accent);
        }
        .search-btn {
            background: var(--accent);
            border: none;
            padding: 0 2rem;
            border-radius: 60px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }

        /* RECIPE GRID */
        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }
        .recipe-card {
            background: var(--bg-card);
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .recipe-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-md);
        }
        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .card-content {
            padding: 1.2rem;
            position: relative;
        }
        .heart-icon {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 28px;
            cursor: pointer;
            color: var(--heart-inactive);
            transition: transform 0.1s;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(4px);
            border-radius: 50%;
            padding: 4px;
            width: 40px;
            text-align: center;
            line-height: 1;
        }
        .heart-icon.active {
            color: var(--heart-active);
            font-variation-settings: 'FILL' 1;
        }
        .recipe-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }
        .recipe-category {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 500;
            text-transform: uppercase;
        }
        /* Loading & empty states */
        .loading-spinner {
            text-align: center;
            padding: 3rem;
        }
        .spinner {
            border: 4px solid var(--border-light);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .no-results {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: var(--modal-overlay);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }
        .modal-content {
            background: var(--bg-card);
            max-width: 750px;
            width: 100%;
            max-height: 85vh;
            border-radius: 2rem;
            overflow-y: auto;
            padding: 1.8rem;
            position: relative;
            box-shadow: 0 30px 40px rgba(0,0,0,0.3);
        }
        .modal-close {
            position: sticky;
            top: 0;
            float: right;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text-secondary);
        }
        .modal h2 {
            margin-bottom: 0.5rem;
        }
        .modal-ingredients {
            margin: 1rem 0;
            background: var(--bg-body);
            padding: 1rem;
            border-radius: 1rem;
        }
        .modal-ingredients ul {
            padding-left: 1.5rem;
        }
        .modal-instructions {
            margin: 1rem 0;
            line-height: 1.6;
        }
        .youtube-link {
            display: inline-block;
            margin-top: 1rem;
            background: #ff0000;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
        }

        /* FOOTER & RESPONSIVE */
        footer {
            text-align: center;
            margin-top: 3rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }
        @media (max-width: 640px) {
            body { padding: 1rem; }
            .header { flex-direction: column; align-items: stretch; text-align: center; }
            .controls { justify-content: center; }
            .search-wrapper { flex-direction: column; }
            .search-btn { padding: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1>🍳 FlavorFind</h1>
            <p>Discover · Cook · Love</p>
        </div>
        <div class="controls">
            <button class="dark-toggle" id="darkModeToggle">🌙 Dark Mode</button>
            <button class="surprise-btn" id="surpriseBtn">✨ Surprise Me</button>
        </div>
    </div>

    <div class="search-section">
        <div class="search-wrapper">
            <input type="text" id="searchInput" class="search-input" placeholder="Search by name or ingredient (e.g., 'Chicken', 'Pasta', 'Tomato')" autocomplete="off">
            <button id="searchBtn" class="search-btn">Find Recipes</button>
        </div>
    </div>

    <div id="recipeGridContainer" class="recipe-grid">
        <!-- dynamic cards will appear here -->
        <div class="loading-spinner"><div class="spinner"></div><p>Fetching delicious recipes...</p></div>
    </div>
    <footer>🍽️ Powered by TheMealDB | Save favorites with ❤️</footer>
</div>

<!-- Modal Structure -->
<div id="recipeModal" class="modal">
    <div class="modal-content">
        <button class="modal-close" id="closeModalBtn">&times;</button>
        <div id="modalBody">
            <h2 id="modalTitle">Recipe Title</h2>
            <div id="modalCategory" style="color: var(--accent); margin-bottom: 1rem;"></div>
            <div class="modal-ingredients" id="modalIngredients"></div>
            <div class="modal-instructions" id="modalInstructions"></div>
            <a href="#" id="modalYoutubeLink" target="_blank" class="youtube-link">▶ Watch on YouTube</a>
        </div>
    </div>
</div>

<script>
    // ---------- DOM elements ----------
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const surpriseBtn = document.getElementById('surpriseBtn');
    const recipeGrid = document.getElementById('recipeGridContainer');
    const modal = document.getElementById('recipeModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const darkToggle = document.getElementById('darkModeToggle');

    // Favorites storage (key)
    let favorites = new Set();  // stores meal id as string

    // Load favorites from localStorage
    function loadFavoritesFromStorage() {
        const stored = localStorage.getItem('flavorfind_favorites');
        if (stored) {
            try {
                const arr = JSON.parse(stored);
                favorites = new Set(arr);
            } catch(e) { console.warn(e); }
        }
        updateAllHeartIcons(); // update UI after load (but grid may not exist)
    }

    function saveFavoritesToStorage() {
        const favArray = Array.from(favorites);
        localStorage.setItem('flavorfind_favorites', JSON.stringify(favArray));
    }

    function toggleFavorite(mealId, event) {
        event.stopPropagation();  // prevent card click (modal)
        if (favorites.has(mealId)) {
            favorites.delete(mealId);
        } else {
            favorites.add(mealId);
        }
        saveFavoritesToStorage();
        // re-render current grid (preserve current search results)
        const currentQuery = searchInput.value.trim();
        if (currentQuery) performSearch(currentQuery);
        else if (window.lastSearchQuery !== undefined) performSearch(window.lastSearchQuery);
        else fetchDefaultRecipes();
    }

    // helper to update heart icon on visible cards (dynamic)
    function updateAllHeartIcons() {
        document.querySelectorAll('.heart-icon').forEach(icon => {
            const mealId = icon.getAttribute('data-id');
            if (mealId && favorites.has(mealId)) {
                icon.classList.add('active');
                icon.innerText = 'favorite';  // Material symbol filled style (uses FILL)
                (icon.style.fontVariationSettings = "'FILL' 1");
            } else if (mealId) {
                icon.classList.remove('active');
                icon.innerText = 'favorite';
                (icon.style.fontVariationSettings = "'FILL' 0");
            }
        });
    }

    // API fetching functions
    async function fetchMealsByQuery(query) {
        if (!query.trim()) return [];
        // first try by name? TheMealDB search by name: lookup.php?s=query
        let url = `https://www.themealdb.com/api/json/v1/1/search.php?s=${encodeURIComponent(query)}`;
        let response = await fetch(url);
        let data = await response.json();
        if (data.meals && data.meals.length > 0) return data.meals;
        // if no meals, try ingredient search: filter.php?i=ingredient
        let ingUrl = `https://www.themealdb.com/api/json/v1/1/filter.php?i=${encodeURIComponent(query)}`;
        let ingResp = await fetch(ingUrl);
        let ingData = await ingResp.json();
        if (ingData.meals && ingData.meals.length > 0) {
            // get full meal details for each id
            const mealsFull = await Promise.all(ingData.meals.slice(0, 12).map(async meal => {
                let detailUrl = `https://www.themealdb.com/api/json/v1/1/lookup.php?i=${meal.idMeal}`;
                let detailResp = await fetch(detailUrl);
                let detailData = await detailResp.json();
                return detailData.meals ? detailData.meals[0] : null;
            }));
            return mealsFull.filter(m => m !== null);
        }
        return [];
    }

    async function fetchRandomMeal() {
        const res = await fetch('https://www.themealdb.com/api/json/v1/1/random.php');
        const data = await res.json();
        return data.meals ? data.meals[0] : null;
    }

    async function fetchDefaultRecipes() {
        // fetch popular 'chicken' as default inspiration
        showLoading();
        try {
            const meals = await fetchMealsByQuery('chicken');
            if (meals && meals.length) renderRecipeGrid(meals);
            else renderNoResults('No recipes found. Try searching something else!');
        } catch (err) {
            renderNoResults('Network error. Please try again.');
        }
    }

    function showLoading() {
        recipeGrid.innerHTML = `<div class="loading-spinner"><div class="spinner"></div><p>Loading mouthwatering recipes...</p></div>`;
    }

    function renderNoResults(message) {
        recipeGrid.innerHTML = `<div class="no-results">😔 ${message}</div>`;
    }

    function renderRecipeGrid(meals) {
        if (!meals || meals.length === 0) {
            renderNoResults('No recipes found. Try a different ingredient or name!');
            return;
        }
        let html = '';
        meals.forEach(meal => {
            const isFav = favorites.has(meal.idMeal);
            const heartFillClass = isFav ? 'active' : '';
            const fillAttr = isFav ? "'FILL' 1" : "'FILL' 0";
            html += `
                <div class="recipe-card" data-meal='${JSON.stringify(meal).replace(/'/g, "&#39;")}'>
                    <img class="card-img" src="${meal.strMealThumb}" alt="${meal.strMeal}" loading="lazy">
                    <div class="card-content">
                        <div class="heart-icon ${heartFillClass}" data-id="${meal.idMeal}" style="font-variation-settings: ${fillAttr}; user-select: none;">favorite</div>
                        <div class="recipe-title">${escapeHtml(meal.strMeal)}</div>
                        <div class="recipe-category">${meal.strCategory || 'Various'}</div>
                    </div>
                </div>
            `;
        });
        recipeGrid.innerHTML = html;
        // attach event listeners to cards and hearts
        document.querySelectorAll('.recipe-card').forEach(card => {
            card.addEventListener('click', (e) => {
                // avoid if click on heart icon (handled separately)
                if (e.target.classList && e.target.classList.contains('heart-icon')) return;
                const mealData = card.getAttribute('data-meal');
                if (mealData) {
                    const mealObj = JSON.parse(mealData);
                    openModal(mealObj);
                }
            });
        });
        document.querySelectorAll('.heart-icon').forEach(heart => {
            heart.addEventListener('click', (e) => {
                e.stopPropagation();
                const mealId = heart.getAttribute('data-id');
                // need to find meal object from parent card
                const parentCard = heart.closest('.recipe-card');
                if (parentCard) {
                    const mealRaw = parentCard.getAttribute('data-meal');
                    if (mealRaw) {
                        const meal = JSON.parse(mealRaw);
                        toggleFavorite(meal.idMeal, e);
                    } else toggleFavorite(mealId, e);
                } else toggleFavorite(mealId, e);
            });
        });
    }

    // simple escape
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function performSearch(query) {
        if (!query.trim()) {
            fetchDefaultRecipes();
            return;
        }
        showLoading();
        try {
            const meals = await fetchMealsByQuery(query);
            if (meals && meals.length) {
                renderRecipeGrid(meals);
                window.lastSearchQuery = query;
            } else {
                renderNoResults(`No recipes found for "${escapeHtml(query)}". Try another keyword.`);
                window.lastSearchQuery = query;
            }
        } catch (error) {
            renderNoResults('⚠️ Something went wrong. Check connection.');
        }
    }

    // surprise me logic
    async function handleSurprise() {
        showLoading();
        try {
            const randomMeal = await fetchRandomMeal();
            if (randomMeal) {
                renderRecipeGrid([randomMeal]);
                window.lastSearchQuery = '';
                searchInput.value = '';
            } else {
                renderNoResults('No surprise meal today. Try again!');
            }
        } catch (err) {
            renderNoResults('Failed to fetch random recipe.');
        }
    }

    // MODAL with full ingredients & instructions
    function openModal(meal) {
        if (!meal) return;
        document.getElementById('modalTitle').innerText = meal.strMeal || 'Recipe';
        document.getElementById('modalCategory').innerHTML = meal.strCategory ? `📂 ${meal.strCategory} | ${meal.strArea || ''}` : '';
        // Build ingredients list
        let ingredientsHtml = '<ul>';
        for (let i = 1; i <= 20; i++) {
            const ingredient = meal[`strIngredient${i}`];
            const measure = meal[`strMeasure${i}`];
            if (ingredient && ingredient.trim() !== '') {
                ingredientsHtml += `<li>${measure ? measure.trim() : ''} ${ingredient.trim()}</li>`;
            }
        }
        ingredientsHtml += '</ul>';
        document.getElementById('modalIngredients').innerHTML = `<strong>🛒 Ingredients</strong> ${ingredientsHtml}`;
        let instructions = meal.strInstructions || 'No instructions provided.';
        // split paragraphs
        instructions = instructions.replace(/\n/g, '<br>');
        document.getElementById('modalInstructions').innerHTML = `<strong>📖 Instructions</strong><br>${instructions}`;
        const youtubeLink = meal.strYoutube ? meal.strYoutube : '#';
        const youtubeAnchor = document.getElementById('modalYoutubeLink');
        if (youtubeLink && youtubeLink !== '#') {
            youtubeAnchor.href = youtubeLink;
            youtubeAnchor.style.display = 'inline-block';
        } else {
            youtubeAnchor.style.display = 'none';
        }
        modal.style.display = 'flex';
    }

    function closeModal() {
        modal.style.display = 'none';
    }

    // Dark mode
    function initDarkMode() {
        const savedMode = localStorage.getItem('flavorfind_darkmode');
        if (savedMode === 'enabled') {
            document.body.classList.add('dark');
            darkToggle.innerHTML = '☀️ Light Mode';
        } else {
            document.body.classList.remove('dark');
            darkToggle.innerHTML = '🌙 Dark Mode';
        }
    }
    function toggleDarkMode() {
        if (document.body.classList.contains('dark')) {
            document.body.classList.remove('dark');
            localStorage.setItem('flavorfind_darkmode', 'disabled');
            darkToggle.innerHTML = '🌙 Dark Mode';
        } else {
            document.body.classList.add('dark');
            localStorage.setItem('flavorfind_darkmode', 'enabled');
            darkToggle.innerHTML = '☀️ Light Mode';
        }
    }

    // Event Listeners
    searchBtn.addEventListener('click', () => {
        const query = searchInput.value.trim();
        performSearch(query);
    });
    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') performSearch(searchInput.value.trim());
    });
    surpriseBtn.addEventListener('click', handleSurprise);
    darkToggle.addEventListener('click', toggleDarkMode);
    closeModalBtn.addEventListener('click', closeModal);
    window.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });

    // initial load
    async function init() {
        loadFavoritesFromStorage();
        initDarkMode();
        await fetchDefaultRecipes();
        // attach global re-render for favorites update if needed
    }
    init();
    // re-render heart after favorite toggles globally: updateAllHeartIcons called inside toggleFavorite already re-renders whole grid? to keep consistency we re-run render after toggle.
    // we override toggleFavorite to call performSearch again? Better: keep current state. In toggleFavorite we check lastSearchQuery and recall.
    window.toggleFavorite = toggleFavorite; // expose for inline but not needed.
    // after any manual favorite change we will re-render same results: but to avoid multiple API calls, we preserve previous meals.
    // modify toggleFavorite to re-render using currently displayed meals (store lastMeals)
    let lastRenderedMeals = [];
    const originalRender = renderRecipeGrid;
    renderRecipeGrid = function(meals) {
        lastRenderedMeals = meals;
        originalRender(meals);
        updateAllHeartIcons();
    };
    window.renderRecipeGrid = renderRecipeGrid;
    // override toggleFavorite to re-render without fetching
    const originalToggle = toggleFavorite;
    window.toggleFavorite = function(mealId, event) {
        if (favorites.has(mealId)) favorites.delete(mealId);
        else favorites.add(mealId);
        saveFavoritesToStorage();
        if (lastRenderedMeals && lastRenderedMeals.length) {
            renderRecipeGrid(lastRenderedMeals);
        } else {
            // if grid not exists, reload default
            fetchDefaultRecipes();
        }
        if (event) event.stopPropagation();
    };
    // rebind after overriding functions
    // Reassign to global to keep references
    window.toggleFavorite = toggleFavorite;
    // ensure that heart events re-trigger new toggleFavorite
    // because heart icon call toggleFavorite but we will update after overriding
    // Also re-run after surprise and search to update lastRenderedMeals
    const originalPerformSearch = performSearch;
    performSearch = async function(query) {
        showLoading();
        try {
            const meals = await fetchMealsByQuery(query);
            if (meals && meals.length) {
                renderRecipeGrid(meals);
                window.lastSearchQuery = query;
            } else {
                renderNoResults(`No results for "${escapeHtml(query)}".`);
                lastRenderedMeals = [];
            }
        } catch(e) { renderNoResults('Error'); }
    };
    window.performSearch = performSearch;
    const originalSurprise = handleSurprise;
    handleSurprise = async function() {
        showLoading();
        const randomMeal = await fetchRandomMeal();
        if (randomMeal) {
            renderRecipeGrid([randomMeal]);
            lastRenderedMeals = [randomMeal];
            searchInput.value = '';
            window.lastSearchQuery = '';
        } else renderNoResults('No random recipe');
    };
    window.handleSurprise = handleSurprise;
    surpriseBtn.onclick = handleSurprise;
    searchBtn.onclick = () => performSearch(searchInput.value.trim());
    // re-attach default init after overriding
    // reset default fetching
    fetchDefaultRecipes = async function() {
        showLoading();
        const meals = await fetchMealsByQuery('chicken');
        if (meals && meals.length) renderRecipeGrid(meals);
        else renderNoResults('Default recipes unavailable');
    };
    window.fetchDefaultRecipes = fetchDefaultRecipes;
    init();
    // final fix: after all, execute init again to ensure binding
    setTimeout(() => {
        if (!lastRenderedMeals.length) fetchDefaultRecipes();
    }, 100);
</script>
</body>
</html>
